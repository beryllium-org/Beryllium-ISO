name: Build ISOs

on:
  workflow_dispatch:
    inputs:
      build_arm:
        description: "Build ARM ISOs"
        required: true
        default: true
        type: boolean
      build_x86:
        description: "Build x86_64 ISOs"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  prepare-release:
    if: ${{ inputs.build_arm == true || inputs.build_x86 == true }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Set current date as tag name
        id: tag
        run: echo "tag_name=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          BUILD_ARM: ${{ inputs.build_arm }}
          BUILD_X86: ${{ inputs.build_x86 }}
        run: |
          set -euo pipefail

          if ! command -v gh >/dev/null 2>&1; then
            echo "GitHub CLI (gh) is required but not available."
            exit 1
          fi

          if [[ "$BUILD_ARM" == "true" && "$BUILD_X86" == "true" ]]; then
            RELEASE_TITLE="[$TAG_NAME] Beryllium OS Rolling ISO builds"
          elif [[ "$BUILD_ARM" == "true" ]]; then
            RELEASE_TITLE="[$TAG_NAME] Beryllium OS Rolling ISO builds (ARM)"
          else
            RELEASE_TITLE="[$TAG_NAME] Beryllium OS Rolling ISO builds (x86_64)"
          fi

          RELEASE_NOTES=$'These are Beryllium OS automated ISO builds.\nThis release text may be updated later on by one or more of the team members.\n\nThese images may be more conveniently downloaded from https://beryllium.gr/'

          if ! gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --draft \
              --prerelease
          else
            gh release edit "$TAG_NAME" \
              --repo "$REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --draft \
              --prerelease
          fi

  build-arm:
    if: ${{ inputs.build_arm == true }}
    needs: [prepare-release]
    runs-on: ubuntu-24.04-arm
    container:
      image: berylliumorg/os:latest
      ports:
        - 80
      options: --privileged --cap-add=MKNOD --device=/dev/loop-control:/dev/loop-control --device=/dev/loop0:/dev/loop0 --cap-add SYS_ADMIN

    strategy:
      fail-fast: false
      matrix:
        iso: [mainline-iso, orion-iso]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: iso

      - name: Install dependencies
        run: |
          init-docker
          sudo pacman -Sy --noconfirm --needed \
            arch-install-scripts bash dosfstools e2fsprogs erofs-utils libarchive libisoburn mtools squashfs-tools grub openssh github-cli

      - name: Build ISO
        run: |
          max_attempts=10
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts for ${{ matrix.iso }}"
            sudo umount -R ./work/aarch64/* || true
            sudo rm -rf /var/lib/pacman/db.lck ./out ./work

            if sudo ./iso/mkarchiso -v -w ./work -o ./out ./iso/${{ matrix.iso }}; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload ISO to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mapfile -t ISOS < <(find ./out -maxdepth 1 -type f -name '*.iso' | sort)
          if [ "${#ISOS[@]}" -eq 0 ]; then
            echo "No ISOs were built; nothing to upload."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${ISOS[@]}" --clobber --repo "$REPO"

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R ./work/aarch64/* || true
          sudo rm -rf ./work ./out

  build-x86:
    if: ${{ inputs.build_x86 == true }}
    needs: [prepare-release]
    runs-on: ubuntu-latest
    container:
      image: berylliumorg/os:latest
      ports:
        - 80
      options: --privileged --cap-add=MKNOD --device=/dev/loop-control:/dev/loop-control --device=/dev/loop0:/dev/loop0 --cap-add SYS_ADMIN

    strategy:
      fail-fast: false
      matrix:
        iso: [x86-iso]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: iso

      - name: Install dependencies
        run: |
          init-docker
          sudo pacman -Sy --noconfirm --needed \
            arch-install-scripts bash dosfstools e2fsprogs erofs-utils libarchive libisoburn mtools squashfs-tools grub openssh github-cli

      - name: Build ISO
        run: |
          max_attempts=10
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts for ${{ matrix.iso }}"
            sudo umount -R ./work/x86_64/* || true
            sudo rm -rf /var/lib/pacman/db.lck ./out ./work

            if sudo ./iso/mkarchiso -v -w ./work -o ./out ./iso/${{ matrix.iso }}; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload ISO to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mapfile -t ISOS < <(find ./out -maxdepth 1 -type f -name '*.iso' | sort)
          if [ "${#ISOS[@]}" -eq 0 ]; then
            echo "No ISOs were built; nothing to upload."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${ISOS[@]}" --clobber --repo "$REPO"

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R ./work/x86_64/* || true
          sudo rm -rf ./work ./out
